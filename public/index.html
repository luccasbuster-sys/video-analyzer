<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Analyzer</title>

<style>
body { font-family: Arial; background:#050507; color:white; padding:20px; }
.hidden { display:none; }
button { padding:10px 15px; margin-top:10px; cursor:pointer; }
#result { margin-top:20px; border:1px solid #444; padding:15px; border-radius:10px; }

.card { border:1px solid #333; padding:10px; margin-top:10px; border-radius:8px; }
.title { font-weight:bold; margin-bottom:5px; }
.good { color:#4CAF50; }
.bad { color:#ff5252; }
.warn { color:#ffc107; }
</style>
</head>

<body>

<h1>Video Analyzer</h1>

<!-- LOGIN -->
<div id="loginBox">
  <h2>Login</h2>
  <input id="email" placeholder="Email"><br>
  <input id="password" type="password" placeholder="Senha"><br>
  <button onclick="login()">Entrar</button>
</div>

<!-- APP -->
<div id="app" class="hidden">

  <h2>Enviar vídeo</h2>

  <input type="file" id="file"><br>
  <button onclick="send()">Analisar</button>

  <p id="status">Aguardando...</p>

  <div id="result" class="hidden">

    <h2 id="statusLabel"></h2>

    <div class="card">
      <div class="title">Score</div>
      <div id="score"></div>
    </div>

    <div class="card">
      <div class="title">Resumo</div>
      <div id="summary"></div>
    </div>

    <div class="card">
      <div class="title">Análise do roteiro</div>
      <div id="scriptAnalysis"></div>
    </div>

    <div class="card">
      <div class="title">Legenda</div>
      <div id="instagramCaption"></div>
    </div>

    <div class="card">
      <div class="title">Transcrição</div>
      <div id="transcriptFull"></div>
    </div>

    <div class="card">
      <div class="title good">Pontos positivos</div>
      <ul id="positives"></ul>
    </div>

    <div class="card">
      <div class="title bad">Pontos negativos</div>
      <ul id="negatives"></ul>
    </div>

    <div class="card">
      <div class="title warn">Ajustes recomendados</div>
      <ul id="adjustments"></ul>
    </div>

  </div>

</div>

<script>

function login() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;

  fetch('/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ email, password })
  })
  .then(r => r.json())
  .then(data => {
    if (data.error) return alert(data.error);

    localStorage.setItem('token', data.token || '');
    document.getElementById('loginBox').classList.add('hidden');
    document.getElementById('app').classList.remove('hidden');
  });
}

function fillList(id, items) {
  const el = document.getElementById(id);
  el.innerHTML = '';

  if (!items || items.length === 0) {
    el.innerHTML = '<li>Nenhum</li>';
    return;
  }

  items.forEach(item => {
    const li = document.createElement('li');
    li.innerText = item;
    el.appendChild(li);
  });
}

function send() {
  const file = document.getElementById('file').files[0];

  if (!file) return alert('Selecione um vídeo');

  const fd = new FormData();
  fd.append('video', file);

  document.getElementById('status').innerText = 'Analisando...';

  fetch('/analyze', {
    method: 'POST',
    body: fd
  })
  .then(r => r.json())
  .then(data => {

    console.log('RESPOSTA:', data);

    if (data.error) {
      document.getElementById('status').innerText = data.error;
      return;
    }

    document.getElementById('result').classList.remove('hidden');

    document.getElementById('statusLabel').innerText = data.resultado;
    document.getElementById('score').innerText = data.score;
    document.getElementById('summary').innerText = data.summary;
    document.getElementById('scriptAnalysis').innerText = data.script_analysis;
    document.getElementById('instagramCaption').innerText = data.instagram_caption;
    document.getElementById('transcriptFull').innerText = data.transcript_full;

    fillList('positives', data.positives);
    fillList('negatives', data.negatives);
    fillList('adjustments', data.adjustments);

    document.getElementById('status').innerText = 'Concluído';
  })
  .catch(err => {
    document.getElementById('status').innerText = 'Erro: ' + err.message;
  });
}

</script>

</body>
</html>
